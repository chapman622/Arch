<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
  <script src="https://www.unpkg.com/alt1/dist/base/index.js"></script>
  <script src="https://www.unpkg.com/alt1/dist/ocr/index.js"></script>
  <script src="https://www.unpkg.com/alt1/dist/chatbox/index.js"></script>
  <title>Archaeology Tracker v3.1</title>
  <style>
    body { font-family: 'Orbitron', monospace; background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); color: #e0e0e0; }
    .app { max-width: 400px; margin: auto; padding: 10px; }
    .tab { display: none; } .tab.active { display: block; }
    .mat-card { background: rgba(0,50,100,0.8); border-radius: 8px; margin: 5px 0; padding: 8px; }
    .progress { height: 20px; background: #333; border-radius: 10px; }
    .status { position: fixed; top: 5px; right: 5px; background: rgba(0,0,0,0.7); padding: 5px; border-radius: 5px; font-size: 12px; }
    button { background: linear-gradient(45deg, #667eea, #764ba2); border: none; color: white; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
    button:hover { transform: scale(1.05); }
    input { background: #333; color: white; border: 1px solid #555; border-radius: 3px; padding: 4px; }
    .culture-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    .zaros { background: purple; } .zamo { background: red; } .sara { background: blue; } .arma { background: green; } .bando { background: brown; } .dragon { background: orange; } .agnostic { background: gray; }
  </style>
</head>
<body>
  <div class="app">
    <h2>🏺 Arch Tracker v3.1</h2>
    <div class="status" id="status">Alt1: Loading...</div>
    
    <!-- Tabs -->
    <div class="btn-group w-100 mb-3">
      <button class="btn btn-primary tab-btn active" onclick="showTab('inventory')">Inventory</button>
      <button class="btn btn-primary tab-btn" onclick="showTab('goals')">Goals</button>
      <button class="btn btn-primary tab-btn" onclick="showTab('artefacts')">Artefacts</button>
      <button class="btn btn-primary tab-btn" onclick="showTab('session')">Session</button>
      <button class="btn btn-primary tab-btn" onclick="showTab('ocr')">OCR</button>
    </div>
    
    <div id="inventory" class="tab active">
      <input id="searchInv" placeholder="Search mats..." oninput="filterMats('inv')">
      <div id="invList"></div>
    </div>
    
    <div id="goals" class="tab">
      <button onclick="bulkGoal(100)">Set All 100</button> <button onclick="bulkGoal(500)">500</button> <button onclick="bulkGoal(1000)">1k</button>
      <div id="goalList"></div>
    </div>
    
    <!-- Artefacts tab: unchanged from v2, cards with restore btn deducting mats -->
    <div id="artefacts" class="tab">
      <input id="searchArt" placeholder="Filter artefacts..." oninput="filterArts()">
      <div id="artList"></div>
    </div>
    
    <div id="session" class="tab">
      <button id="timerBtn" onclick="toggleTimer()">Start Session</button>
      <div id="sessionStats">XP: 0 | XP/hr: -- | Mats Gained: 0</div>
      <div id="sessionLog"></div>
    </div>
    
    <div id="ocr" class="tab">
      <button onclick="readChat()">Scan Chat (Auto Mats)</button>
      <button onclick="readStorage()">🆕 Read Storage (Full OCR!)</button>
      <textarea id="manualPaste" placeholder="Paste chat/text... (e.g. 'You find 5 Third Age iron')" rows="3"></textarea>
      <button onclick="parseManual()">Parse & Add</button>
      <div id="ocrStatus">Ready</div>
    </div>
  </div>

  <script>
    // Full material order (wiki culture sort = storage grid order!)
    const materialOrder = [
      'Third Age iron', 'Samite silk', 'White oak', 'Goldrune', 'Orthenglass',
      'Vellum', 'Leather scraps', 'Soapstone', 'Animal furs', 'Fossilised bone',
      'Stormguard steel', 'Wings of War', 'Armadylean yellow', 'Aetherium alloy', 'Quintessence',
      'Malachite green', 'Mark of the Kyzaj', 'Vulcanised rubber', 'Warforged bronze', 'Yu\'biusk clay',
      'Dragon metal', 'Orgone', 'Compass rose', 'Carbon black', 'Felt',
      'Keramos', 'White marble', 'Cobalt blue', 'Everlight silvthril', 'Star of Saradomin',
      'Cadmium red', 'Chaotic brimstone', 'Demonhide', 'Eye of Dagon', 'Hellfire metal',
      'Zarosian insignia', 'Imperial steel', 'Ancient vis', 'Tyrian purple', 'Blood of Orcus'
    ];
    const NUM_MATS = materialOrder.length; // 40

    // Header detection for scroll pos
    const headerMap = {
      'Agnostic materials': 0,
      'Armadylean materials': 10,
      'Bandosian materials': 15,
      'Dragonkin materials': 20,
      'Saradominist materials': 25,
      'Zamorakian materials': 30,
      'Zarosian materials': 35
    };
    const HEADER_YS = [12, 82, 152, 222, 292, 362, 432]; // Tuned relative Ys (adjust if needed)
    const HEADER_BOX = {w: 200, h: 20}; // Header text bbox

    // OCR params (RS3 tuned)
    const COL_WIDTH = 74;
    const ROW_HEIGHT = 52;
    const NUM_BOX = {w: 45, h: 16};
    const NUM_OFFSET_X = 25;
    const NUM_OFFSET_Y = 8;

    // Cultures for dots/UI (simplified)
    const cultureColors = {0: 'agnostic', 10:'arma', 15:'bando', 20:'dragon', 25:'sara', 30:'zamo', 35:'zaros'};

    let inventory = {};
    let goals = {};
    let session = {start:0, xp:0, matsGained:{}, restores:0};
    let savedRegion = null;

    // Init
    A1lib.identifyApp('appconfig.json');
    loadData();
    initAlt1();
    buildUI();
    setInterval(refreshUI, 1000);

    function initAlt1() {
      if (alt1) {
        document.getElementById('status').innerHTML = 'Alt1 ✔';
        document.getElementById('status').style.color = 'lime';
      }
    }

    function loadData() {
      const saved = localStorage.archData ? JSON.parse(localStorage.archData) : {};
      materialOrder.forEach((mat, i) => {
        inventory[mat] = saved.inventory?.[mat] || 0;
        goals[mat] = saved.goals?.[mat] || 0;
      });
      session = {...session, ...saved.session};
    }

    function saveData() {
      localStorage.archData = JSON.stringify({inventory, goals, session});
    }

    // UI Builders (abbrev: inventory/goals/arts/session lists with +-/progress/restore/etc.)
    function buildUI() { refreshInventory(); refreshGoals(); /* etc. */ }
    function refreshInventory() { /* filter/search, cards w/ +/- input, progress to goal */ }
    // ... (full impl from v2: artefact cards w/ level/XP/mats needed green/red, restore deducts & logs XP)

    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      event.target.classList.add('active');
      if (tab === 'ocr') readChat(); // Auto-scan on tab
    }

    // OCR: Chat (v2)
    function readChat() {
      const reader = new Chatbox.default();
      reader.readargs = {colors: [A1lib.mixColor(255,255,255)], /* white text */ };
      reader.read();
      const lines = reader.result.lines;
      let added = 0;
      lines.forEach(line => {
        const match = line.match(/You find some? (\d+)? (.+)/i);
        if (match) {
          const qty = parseInt(match[1]) || 1;
          const mat = match[2].trim();
          const idx = materialOrder.indexOf(mat);
          if (idx > -1) {
            inventory[materialOrder[idx]] += qty;
            session.matsGained[mat] = (session.matsGained[mat] || 0) + qty;
            added++;
          }
        }
      });
      refreshUI();
      document.getElementById('ocrStatus').innerHTML = `Chat: +${added} mats`;
    }

    // 🆕 Storage OCR (star!)
    function readStorage() {
      if (!alt1) return alert('Alt1 needed!');
      document.getElementById('ocrStatus').innerHTML = 'Pick region over visible grid...';
      
      alt1.pickRegion((region) => {
        if (!region) return;
        savedRegion = region; // Save for next
        const img = alt1.captureArea(region.x, region.y, region.width, region.height);
        
        // Step 1: Detect scroll pos via headers
        let startIdx = 0;
        for (let h=0; h<HEADER_YS.length; h++) {
          const hy = HEADER_YS[h];
          if (hy + HEADER_BOX.h > region.height) break;
          const headerText = alt1.ocr.read(img, 0, hy, Math.min(HEADER_BOX.w, region.width), HEADER_BOX.h);
          const norm = headerText.toLowerCase().trim().replace(/materials?/g, 'materials');
          const key = Object.keys(headerMap).find(k => norm.includes(k.toLowerCase()));
          if (key) {
            startIdx = headerMap[key];
            break;
          }
        }
        
        // Step 2: Read numbers
        let readCount = 0;
        for (let idx = startIdx; idx < NUM_MATS; idx++) {
          const col = (idx % 5);
          const row = Math.floor(idx / 5);
          const nx = col * COL_WIDTH + NUM_OFFSET_X;
          const ny = row * ROW_HEIGHT + NUM_OFFSET_Y;
          if (ny + NUM_BOX.h > region.height) break; // Out of view
          
          const numStr = alt1.ocrNumber.read(img, nx, ny, NUM_BOX.w, NUM_BOX.h);
          const count = parseInt(numStr) || 0;
          const mat = materialOrder[idx];
          if (inventory[mat] !== count) { // Changed
            inventory[mat] = count;
            readCount++;
          }
        }
        
        refreshUI();
        saveData();
        document.getElementById('ocrStatus').innerHTML = `✅ Read ${readCount} mats from storage (start: #${startIdx+1})`;
      });
    }

    // Manual parse (v2)
    function parseManual() {
      const text = document.getElementById('manualPaste').value;
      // Regex for "5 Third Age iron" etc., add to inv
      // ...
    }

    // Other fns: bulkGoal, toggleTimer (persists), restoreArt (deduct mats, add XP), filter, etc. (full v2 impl)
    function refreshUI() { saveData(); /* update all tabs/status */ }

    // Artefacts data (v2: ~40+ with recipes, sites, levels, XP)
    const artefacts = [ /* full from v2 wiki data */ ];
  </script>
</body>
</html>
