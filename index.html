<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Archaeology Tracker v4</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
<script src="https://www.unpkg.com/alt1/dist/base/index.js"></script>
<script src="https://www.unpkg.com/alt1/dist/ocr/index.js"></script>
<script src="https://www.unpkg.com/alt1/dist/chatbox/index.js"></script>
<style>
body { font-family: 'Orbitron', monospace; background: linear-gradient(135deg,#1a1a2e,#16213e,#0f3460); color:#e0e0e0; margin:0; padding:10px; }
.app{ max-width:400px; margin:auto; }
h2{ text-align:center; color:#a0d0ff; }
.tab{ display:none; }
.tab.active{ display:block; }
.btn-group{ margin-bottom:15px; }
.mat-card{ background: rgba(0,50,100,0.7); border-radius:8px; padding:10px; margin:8px 0; border:1px solid #444; }
.status{ position:fixed; top:10px; right:10px; background:rgba(0,0,0,0.7); padding:6px 12px; border-radius:6px; font-size:12px; z-index:10; }
.progress{ height:8px; background:#333; border-radius:4px; overflow:hidden; margin-top:4px; }
.progress-bar{ height:100%; background:#4caf50; width:0%; }
button{ margin:4px; }
input[type="number"], input[type="text"]{ width:80px; background:#222; color:white; border:1px solid #555; padding:4px; border-radius:4px; }
</style>
</head>
<body>

<div class="app">
<h2>🏺 Archaeology Tracker v4.1</h2>
<div class="status" id="status">Alt1: Checking...</div>

<div class="btn-group btn-group-justified w-100">
  <button class="btn btn-primary tab-btn active" onclick="showTab('inventory')">Inventory</button>
  <button class="btn btn-primary tab-btn" onclick="showTab('ocr')">OCR</button>
</div>

<div id="inventory" class="tab active">
  <input type="text" id="searchInv" placeholder="Search materials..." style="width:100%; margin-bottom:10px;" oninput="refreshInventory()">
  <div id="invList"></div>
</div>

<div id="ocr" class="tab">
  <h5>Material Storage OCR</h5>
  <p>Use Alt+2 → drag over storage grid → paste coords</p>
  X: <input type="number" id="regX">
  Y: <input type="number" id="regY"><br>
  W: <input type="number" id="regW">
  H: <input type="number" id="regH"><br>
  <button onclick="saveRegion()">Save Region</button>
  <button onclick="readStorage()">Read Storage Now</button>
  <button onclick="previewCapture()">Preview Capture</button>
  <button onclick="testOCR()">Test OCR</button>
  <p id="storageStatus">No region saved</p>
</div>
</div>

<script>
const materialOrder = [
  'Third Age iron','Samite silk','White oak','Goldrune','Orthenglass',
  'Vellum','Leather scraps','Soapstone','Animal furs','Fossilised bone',
  'Stormguard steel','Wings of War','Armadylean yellow','Aetherium alloy','Quintessence',
  'Malachite green','Mark of the Kyzaj','Vulcanised rubber','Warforged bronze','Yu\'biusk clay',
  'Dragon metal','Orgone','Compass rose','Carbon black','Felt',
  'Keramos','White marble','Cobalt blue','Everlight silvthril','Star of Saradomin',
  'Cadmium red','Chaotic brimstone','Demonhide','Eye of Dagon','Hellfire metal',
  'Zarosian insignia','Imperial steel','Ancient vis','Tyrian purple','Blood of Orcus'
];

let inventory = {};
materialOrder.forEach(m=>inventory[m]=0);

function saveData(){ localStorage.setItem('archTracker', JSON.stringify(inventory)); }
function loadData(){ Object.assign(inventory, JSON.parse(localStorage.getItem('archTracker')||'{}')); }

function refreshInventory(){
  const search = document.getElementById('searchInv')?.value?.toLowerCase()||'';
  const list = document.getElementById('invList');
  list.innerHTML = '';
  materialOrder.forEach(mat=>{
    if(search && !mat.toLowerCase().includes(search)) return;
    const div=document.createElement('div'); div.className='mat-card';
    div.innerHTML=`<strong>${mat}</strong>: ${inventory[mat]}`;
    list.appendChild(div);
  });
}

function showTab(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelector(`button[onclick="showTab('${id}')"]`)?.classList.add('active');
  if(id==='inventory') refreshInventory();
}

// --- Region helpers ---
function getRegion(){
  return {
    x: parseInt(regX.value)||0,
    y: parseInt(regY.value)||0,
    w: parseInt(regW.value)||400,
    h: parseInt(regH.value)||600
  };
}
function saveRegion(){
  localStorage.setItem('archRegion', JSON.stringify(getRegion()));
  document.getElementById('storageStatus').textContent="Region saved!";
}

// --- Alt1 helpers ---
function checkAlt1(){
  const el=document.getElementById('status');
  if(typeof alt1!=='undefined'){ el.textContent="Alt1 ✔ Connected"; el.style.color='lime'; }
  else{ el.textContent="Alt1 not detected"; el.style.color='orange'; }
}

// --- OCR helpers ---
const OCR_OFF_X=25, OCR_OFF_Y=8, OCR_NUM_W=45, OCR_NUM_H=16; // tweak these if needed
function previewCapture(){
  if(!alt1) return alert("Alt1 not connected");
  const reg=getRegion();
  alt1.capture(reg.x,reg.y,reg.w,reg.h,img=>{
    if(!img){ alert("Capture failed!"); return; }
    alt1.preview(img);
    document.getElementById('storageStatus').textContent="Capture previewed!";
  });
}
function testOCR(){
  if(!alt1) return alert("Alt1 not connected");
  const reg=getRegion();
  alt1.capture(reg.x,reg.y,reg.w,reg.h,img=>{
    if(!img){ alert("Capture failed!"); return; }
    const text = alt1.ocr.read(img, OCR_OFF_X, OCR_OFF_Y, OCR_NUM_W, OCR_NUM_H);
    alert("OCR read: ["+text+"]");
    document.getElementById('storageStatus').textContent="OCR test done!";
  });
}

function readStorage(){
  if(!alt1) return alert("Alt1 not connected");
  const reg=getRegion();
  alt1.capture(reg.x,reg.y,reg.w,reg.h,img=>{
    if(!img){ alert("Capture failed! Check windowed mode/scaling."); return; }
    let updated=0;
    const COL_W=74, ROW_H=52, NUM_W=OCR_NUM_W, NUM_H=OCR_NUM_H, OFF_X=OCR_OFF_X, OFF_Y=OCR_OFF_Y;
    for(let i=0;i<materialOrder.length;i++){
      const col=i%5, row=Math.floor(i/5);
      const nx=col*COL_W+OFF_X, ny=row*ROW_H+OFF_Y;
      if(nx+NUM_W>reg.w || ny+NUM_H>reg.h) continue;
      const numStr=alt1.ocr.read(img,nx,ny,NUM_W,NUM_H);
      const count=parseInt(numStr.trim())||0;
      if(inventory[materialOrder[i]]!==count){ inventory[materialOrder[i]]=count; updated++; }
    }
    saveData(); refreshInventory();
    document.getElementById('storageStatus').textContent=updated>0?`Updated ${updated} materials!`:'No changes detected';
  });
}

// --- Init ---
loadData(); refreshInventory(); checkAlt1();
setInterval(checkAlt1,2000);
</script>
</body>
</html>
